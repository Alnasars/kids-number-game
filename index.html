<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Number Fun: Kids Math</title>
    
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f9ff; margin: 0; overflow: hidden; -webkit-user-select: none; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .entry-portal { position: fixed; inset: 0; background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: transform 0.5s ease-in-out; }
        .play-btn { background: #fbbf24; color: #78350f; padding: 1.2rem 3.5rem; border-radius: 9999px; font-size: 1.4rem; font-weight: 900; box-shadow: 0 8px 0 #d97706, 0 15px 25px rgba(0,0,0,0.2); animation: float 3s ease-in-out infinite; text-transform: uppercase; cursor: pointer; border: none; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .game-card { background: white; border-radius: 24px; padding: 12px; width: 95vw; max-width: 360px; height: 85vh; max-height: 700px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 3px solid #bae6fd; display: flex; flex-direction: column; position: relative; z-index: 10; }
        .close-trigger { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; z-index: 20; border: 2px solid white; cursor: pointer; }
        
        .math-container { display: flex; flex-direction: column; align-items: flex-end; font-family: 'Courier New', monospace; font-weight: 900; font-size: 3.2rem; color: #334155; line-height: 1; padding-right: 20px; }
        .math-line { border-top: 5px solid #334155; width: 120%; margin-top: 4px; }
        
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: auto; }
        .numpad button { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; height: clamp(45px, 7vh, 60px); font-size: 1.6rem; font-weight: 700; box-shadow: 0 4px 0 #e2e8f0; color: #334155; }
        
        .modal-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 24px; padding: 20px; text-align: center; }
        .hidden { display: none !important; }

        .shooting-star { position: absolute; bottom: 40%; left: 50%; font-size: 2rem; z-index: 9999; pointer-events: none; animation: shoot 1.5s ease-out forwards; }
        @keyframes shoot { 0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tw-x), var(--tw-y)) scale(0) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div id="entryPortal" class="entry-portal">
        <div class="text-7xl mb-4">🚀</div>
        <h1 class="text-4xl font-black mb-2 uppercase tracking-tighter">Number Fun</h1>
        <p class="text-sky-100 font-bold mb-10 text-xs uppercase tracking-widest">Designed for Kids • Powered by Logic</p>
        
        <button id="mainPlayBtn" onclick="initializeGame()" class="play-btn">Tap to Play</button>
        
        <div class="absolute bottom-6 flex flex-col items-center gap-2">
            <button onclick="showPrivacy()" class="text-sky-200 text-[10px] underline uppercase tracking-widest">Privacy Policy</button>
            <p class="text-sky-300 text-[9px] uppercase">v3.8.1 Stable Master</p>
        </div>
    </div>

    <div id="privacyModal" class="fixed inset-0 bg-black/80 z-[10000] hidden p-6 flex items-center justify-center">
        <div class="bg-white rounded-3xl p-6 max-w-sm">
            <h2 class="font-black text-xl mb-2">Privacy Policy</h2>
            <p class="text-sm text-gray-600 mb-6 leading-relaxed">We protect your child's privacy. We do not collect names, locations, or personal data. This app uses basic analytics to count visitors only.</p>
            <button onclick="document.getElementById('privacyModal').classList.add('hidden')" class="w-full bg-sky-500 text-white font-black py-4 rounded-2xl uppercase">Close</button>
        </div>
    </div>

    <div class="game-card" id="gameCard">
        <button onclick="confirmExit()" class="close-trigger">✕</button>

        <div id="exitModal" class="modal-overlay hidden" style="z-index: 5000;">
            <div class="text-6xl mb-4">👋</div>
            <h2 class="text-2xl font-black text-slate-700 mb-4 uppercase">Want to Exit?</h2>
            <div class="flex gap-3 w-full">
                <button onclick="document.getElementById('exitModal').classList.add('hidden')" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold uppercase text-xs">Stay</button>
                <button onclick="handleFullExit()" class="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold uppercase text-xs">Exit</button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-2 px-1 pt-2">
            <div class="flex gap-1 flex-1 mr-2">
                <button id="btn-counting" onclick="setMode('counting')" class="flex-1 py-1 rounded-lg font-bold text-[8px] bg-sky-500 text-white uppercase">Count</button>
                <button id="btn-addition" onclick="setMode('addition')" class="flex-1 py-1 rounded-lg font-bold text-[8px] bg-gray-100 text-gray-400 uppercase">Add</button>
                <button id="btn-subtraction" onclick="setMode('subtraction')" class="flex-1 py-1 rounded-lg font-bold text-[8px] bg-gray-100 text-gray-400 uppercase">Sub</button>
            </div>
            <div id="scoreLabel" class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-[10px] font-black">⭐ 0</div>
        </div>

        <div id="displayArea" class="bg-slate-50 rounded-2xl flex-1 flex items-center justify-center mb-2 border-2 border-slate-100 relative overflow-hidden"></div>
        <div id="inputBox" class="text-center text-3xl font-black text-sky-500 mb-2 h-10 tracking-widest">---</div>
        
        <div class="numpad pb-2">
            <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
            <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
            <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
            <button onclick="press('clear')">C</button><button onclick="press('0')">0</button>
            <button onclick="press('enter')" class="bg-emerald-500 !text-white !shadow-[0_4px_0_#065f46]">OK</button>
        </div>
    </div>

    <script>
        let game = { mode: 'counting', range: 10, score: 0, ans: '', input: '', active: false, voiceOn: true, lastAns: '' };
        let happySynth, femaleVoice = null;

        function showPrivacy() { document.getElementById('privacyModal').classList.remove('hidden'); }
        function confirmExit() { document.getElementById('exitModal').classList.remove('hidden'); }
        
        function handleFullExit() {
            // Since browsers block window.close(), we reset the state and "Hide" the game.
            location.reload(); 
        }

        async function initializeGame() {
            document.getElementById('mainPlayBtn').innerText = "Loading...";
            const toneScript = document.createElement('script');
            toneScript.src = "https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js";
            toneScript.onload = async () => {
                await Tone.start();
                happySynth = new Tone.PolySynth(Tone.Synth).toDestination();
                document.getElementById('entryPortal').style.transform = "translateY(-100%)";
                game.active = true;
                findVoice();
                speak("Let's play!", () => { setMode('counting'); });
            };
            document.head.appendChild(toneScript);
        }

        function findVoice() {
            const voices = window.speechSynthesis.getVoices();
            femaleVoice = voices.find(v => (v.name.includes('Female') || v.name.includes('Google US')) && v.lang.includes('en'));
            if (!femaleVoice) femaleVoice = voices.find(v => v.lang.includes('en'));
        }
        window.speechSynthesis.onvoiceschanged = findVoice;

        function setMode(m) {
            game.mode = m;
            document.querySelectorAll('[id^="btn-"]').forEach(b => {
                b.className = b.id === 'btn-'+m ? "flex-1 py-1 rounded-lg font-bold text-[8px] bg-sky-500 text-white uppercase" : "flex-1 py-1 rounded-lg font-bold text-[8px] bg-gray-100 text-gray-400 uppercase";
            });
            newQuestion();
        }

        function newQuestion() {
            let n1, n2, html = '', speech = '', currentAns = '';
            do {
                if (game.mode === 'counting') { 
                    n1 = Math.floor(Math.random() * game.range) + 1;
                    currentAns = n1.toString(); 
                    html = `<div class="text-7xl font-black text-slate-700">${n1}</div>`; 
                    speech = n1.toString();
                } else if (game.mode === 'addition') { 
                    n1 = Math.floor(Math.random() * 5) + 1; n2 = Math.floor(Math.random() * 5) + 1; 
                    currentAns = (n1+n2).toString();
                    html = `<div class="math-container"><div>${n1}</div><div>+ ${n2}</div><div class="math-line"></div></div>`; 
                    speech = n1 + " plus " + n2;
                } else if (game.mode === 'subtraction') {
                    n1 = Math.floor(Math.random() * 9) + 1; n2 = Math.floor(Math.random() * n1);
                    currentAns = (n1-n2).toString();
                    html = `<div class="math-container"><div>${n1}</div><div>- ${n2}</div><div class="math-line"></div></div>`;
                    speech = n1 + " minus " + n2;
                }
            } while (currentAns === game.lastAns);
            
            game.ans = currentAns; game.lastAns = currentAns;
            document.getElementById('displayArea').innerHTML = html;
            game.input = ''; document.getElementById('inputBox').textContent = '---'; 
            if(game.voiceOn) speak(speech);
        }

        function press(v) {
            if(!game.active) return;
            if (v === 'clear') game.input = '';
            else if (v === 'enter') check(); 
            else if (game.input.length < 4) game.input += v;
            document.getElementById('inputBox').textContent = game.input || '---';
        }

        function check() {
            if (game.input === game.ans) {
                game.score++; updateStars();
                if(game.score % 5 === 0) triggerReward();
                else speak("Correct!", () => { setTimeout(newQuestion, 500); });
            } else {
                speak("No, it was " + game.ans, () => { setTimeout(newQuestion, 1000); });
            }
        }

        function updateStars() {
            let stars = '';
            let count = game.score % 6; if (game.score > 0 && count === 0) count = 5;
            for(let i=0; i<count; i++) stars += '⭐';
            document.getElementById('scoreLabel').textContent = stars || '⭐ 0';
        }

        function triggerReward() {
            const card = document.getElementById('gameCard');
            const now = Tone.now();
            happySynth.triggerAttackRelease("C5", "8n", now);
            happySynth.triggerAttackRelease("E5", "8n", now + 0.1);
            happySynth.triggerAttackRelease("G5", "4n", now + 0.2);
            for (let i = 0; i < 25; i++) {
                const fx = document.createElement('div');
                fx.className = 'shooting-star'; fx.innerHTML = '⭐';
                fx.style.setProperty('--tw-x', `${(Math.random() - 0.5) * 500}px`);
                fx.style.setProperty('--tw-y', `${-Math.random() * 600}px`);
                card.appendChild(fx);
                setTimeout(() => fx.remove(), 1500);
            }
            speak("Excellent!", () => { setTimeout(newQuestion, 1500); });
        }

        function speak(t, cb) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            if (femaleVoice) m.voice = femaleVoice;
            m.onend = () => { if(cb) cb(); };
            window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
