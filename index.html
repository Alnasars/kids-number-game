<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>123 Number Game: Kids Learning</title>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 600;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ── FB BROWSER WARNING ── */
        #fb-wall {
            position: fixed; inset: 0; z-index: 99999;
            background: #0f172a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 30px;
            color: white;
        }
        #fb-wall .fb-emoji { font-size: 4rem; margin-bottom: 1rem; }
        #fb-wall h1 {
            font-size: 1.6rem; font-weight: 900;
            color: #fbbf24; margin-bottom: 0.75rem;
            text-transform: uppercase; letter-spacing: -0.5px;
        }
        #fb-wall p {
            font-size: 0.95rem; color: #cbd5e1;
            line-height: 1.6; margin-bottom: 1.5rem;
            max-width: 300px;
        }
        #fb-wall .steps-box {
            background: #1e293b; border-radius: 16px;
            padding: 20px 24px; margin-bottom: 1.5rem;
            width: 100%; max-width: 320px; text-align: left;
        }
        #fb-wall .step {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 14px; font-size: 0.95rem; color: #e2e8f0;
        }
        #fb-wall .step:last-child { margin-bottom: 0; }
        #fb-wall .step-num {
            background: #fbbf24; color: #78350f;
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.85rem; flex-shrink: 0;
        }
        #fb-wall .arrow-anim {
            font-size: 2.5rem;
            animation: bounce-right 1s ease infinite;
            margin-bottom: 1rem;
        }
        @keyframes bounce-right {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }
        #fb-wall .skip-btn {
            background: none; border: 1px solid #334155;
            color: #64748b; padding: 10px 24px;
            border-radius: 99px; cursor: pointer;
            font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* ── STARTUP SCREEN ── */
        .portal {
            position: fixed; inset: 0; background: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; color: white;
            transition: transform 0.5s ease; text-align: center;
        }
        .portal-emoji { font-size: 4.5rem; margin-bottom: 1rem; }
        .portal h1 {
            font-size: 2.4rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: -1px; margin-bottom: 0.25rem;
        }
        .portal-hint {
            font-size: 10px; color: #7dd3fc; margin-bottom: 2rem;
            text-transform: uppercase; letter-spacing: 3px; padding: 0 1.5rem;
        }
        .play-btn {
            background: #fbbf24; color: #78350f;
            padding: 1.2rem 4rem; border-radius: 99px;
            font-size: 1.5rem; font-weight: 900;
            box-shadow: 0 8px 0 #d97706;
            text-transform: uppercase; margin-bottom: 25px;
            border: none; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .toddler-link {
            color: #38bdf8; font-weight: 700; text-decoration: underline;
            cursor: pointer; text-transform: uppercase; font-size: 0.875rem;
            margin-bottom: 1.5rem; background: none; border: none;
        }
        .privacy-link {
            color: #38bdf8; font-size: 10px; text-transform: uppercase;
            font-weight: 700; letter-spacing: 3px;
            border-top: 1px solid #1e3a5f; padding-top: 1rem;
            background: none; border-left: none; border-right: none; border-bottom: none;
            cursor: pointer; width: 10rem;
        }

        /* ── GAME CARD ── */
        .game-card {
            background: #ffffff; border-radius: 24px; padding: 16px;
            width: 92vw; max-width: 360px; height: 86vh; max-height: 650px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            display: flex; flex-direction: column;
            position: relative; z-index: 10;
        }
        .close-trigger {
            position: absolute; top: -10px; right: -10px;
            background: #ef4444; color: white;
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; border: 3px solid white;
            cursor: pointer; z-index: 100; font-size: 0.85rem;
        }
        .util-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .util-btn {
            flex: 1; height: 34px; border-radius: 8px;
            border: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; background: #f8fafc;
            cursor: pointer; color: #1e293b; font-size: 1rem;
            -webkit-tap-highlight-color: transparent;
        }
        .util-btn-wa { background: #25D366; color: white; border: none; font-size: 10px; }
        .mode-row { display: flex; gap: 4px; margin-bottom: 8px; align-items: center; }
        .mode-btn {
            flex: 1; padding: 8px 0; border-radius: 6px;
            font-size: 9px; font-weight: 900; text-transform: uppercase;
            border: none; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .m-active  { background: #0ea5e9; color: white; }
        .m-inactive { background: #e2e8f0; color: #334155; }
        .score-box {
            background: #fef9c3; color: #a16207;
            padding: 4px 10px; border-radius: 6px;
            font-size: 9px; font-weight: 900; white-space: nowrap;
        }
        .screen {
            background: #f8fafc; border-radius: 20px; flex-grow: 1;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px; border: 2px solid #f1f5f9; position: relative;
        }
        .input-display {
            text-align: center; font-size: 1.875rem; font-weight: 900;
            color: #0ea5e9; margin-bottom: 0.5rem; height: 2rem;
            letter-spacing: 4px; text-transform: uppercase;
        }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: auto; }
        .numpad button {
            background: #ffffff; border: 1px solid #e2e8f0;
            border-radius: 12px; height: 50px;
            font-size: 1.6rem; font-weight: 700; color: #1e293b;
            box-shadow: 0 3px 0 #f1f5f9; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .ok-btn {
            background: #10b981 !important; color: white !important;
            box-shadow: 0 4px 0 #065f46 !important; font-size: 1.1rem !important;
        }
        .global-modal {
            position: fixed; inset: 0; background: white; z-index: 20000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 30px;
        }
        .modal-transparent { background: transparent !important; padding: 0 !important; }
        .policy-container {
            width: 100%; max-width: 400px; background: white;
            border: 4px solid #0ea5e9; border-radius: 24px;
            padding: 20px; display: flex; flex-direction: column; max-height: 80vh;
        }
        .policy-container h2 {
            font-size: 1.25rem; font-weight: 900; color: #1e293b;
            text-transform: uppercase; margin-bottom: 0.5rem;
        }
        .policy-container h2.sky { color: #0ea5e9; }
        .policy-scroll {
            overflow-y: auto; text-align: left;
            font-size: 11px; color: #64748b; line-height: 1.5;
            padding-right: 10px; margin-bottom: 20px;
        }
        .policy-scroll b { color: #1e293b; display: block; margin-top: 12px; }
        .policy-p { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.6; padding: 0 1rem; }
